name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: quality-gate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm install

      - name: Run full quality gate
        run: npm run quality

      - name: Verify shebang + executable bit on bundle and shim
        if: always()
        run: |
          test -f dist/cli.js || { echo "Missing: dist/cli.js"; exit 1; }
          head -1 dist/cli.js | grep -q '^#!/usr/bin/env node' || { echo "Missing shebang in dist/cli.js"; exit 1; }
          test -x dist/cli.js || { echo "Not executable: dist/cli.js"; exit 1; }
          test -f bin/cdp || { echo "Missing: bin/cdp"; exit 1; }
          head -1 bin/cdp | grep -q '^#!/usr/bin/env bash' || { echo "Missing shebang in bin/cdp"; exit 1; }
          test -x bin/cdp || { echo "Not executable: bin/cdp"; exit 1; }

      - name: Verify zero `any` and zero globalThis writes in src/
        if: always()
        run: |
          if grep -rE ':\s*any\b' src/ --include='*.ts'; then
            echo "Found explicit 'any' types in src/" >&2
            exit 1
          fi
          if grep -rnE 'globalThis\.[A-Za-z_][A-Za-z0-9_]*\s*=' src/ --include='*.ts'; then
            echo "Found globalThis writes in src/" >&2
            exit 1
          fi

      - name: Verify install.sh + plugin manifests + cdp shim end-to-end
        if: matrix.node == '22'
        run: |
          bash bin/install.sh
          test -f dist/cli.js || { echo "install.sh did not produce dist/cli.js"; exit 1; }
          test -f .claude-plugin/plugin.json || { echo "Missing .claude-plugin/plugin.json"; exit 1; }
          test -f .claude-plugin/marketplace.json || { echo "Missing .claude-plugin/marketplace.json"; exit 1; }
          test -f skills/cdp/SKILL.md || { echo "Missing skills/cdp/SKILL.md"; exit 1; }
          head -5 skills/cdp/SKILL.md | grep -E '^(name|description|version):' >/dev/null
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"
          ./bin/cdp doctor | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d); if(typeof j.ok!=='boolean')process.exit(1)})"

      - name: Upload quality-reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-node${{ matrix.node }}
          path: quality-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload coverage to summary (Node 22 only)
        if: always() && matrix.node == '22' && hashFiles('quality-reports/summary.md') != ''
        run: |
          {
            echo "## Quality Gate Summary"
            echo
            cat quality-reports/summary.md
          } >> $GITHUB_STEP_SUMMARY

  # Block merge until quality-gate passes on all matrix entries.
  required:
    name: required
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always()
    steps:
      - name: Fail if any quality-gate matrix job failed
        run: |
          if [[ "${{ needs.quality-gate.result }}" != "success" ]]; then
            echo "Quality gate failed (result=${{ needs.quality-gate.result }})"
            exit 1
          fi
          echo "Quality gate passed."
