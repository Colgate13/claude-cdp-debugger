name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: quality-gate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm install

      - name: Run full quality gate
        run: npm run quality

      - name: Verify shebang + executable bit on bins
        if: always()
        run: |
          for f in dist/bin/debug.js dist/bin/debug-daemon.js dist/bin/doctor.js; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
            head -1 "$f" | grep -q '^#!/usr/bin/env node' || { echo "Missing shebang in $f"; exit 1; }
            test -x "$f" || { echo "Not executable: $f"; exit 1; }
          done

      - name: Verify zero `any` and zero globalThis writes in src/
        if: always()
        run: |
          if grep -rE ':\s*any\b' src/ --include='*.ts'; then
            echo "Found explicit 'any' types in src/" >&2
            exit 1
          fi
          if grep -rnE 'globalThis\.[A-Za-z_][A-Za-z0-9_]*\s*=' src/ --include='*.ts'; then
            echo "Found globalThis writes in src/" >&2
            exit 1
          fi

      - name: Verify skill installs end-to-end as Claude Code plugin
        if: matrix.node == '22'
        run: |
          mkdir -p $HOME/.claude/skills
          bash bin/install.sh
          test -L $HOME/.claude/skills/debug || { echo "Symlink not created"; exit 1; }
          test -f $HOME/.claude/skills/debug/SKILL.md || { echo "SKILL.md not reachable via symlink"; exit 1; }
          test -f $HOME/.claude/skills/debug/dist/bin/debug.js || { echo "debug.js not reachable via symlink"; exit 1; }
          head -5 $HOME/.claude/skills/debug/SKILL.md | grep -E '^(name|description|version):' >/dev/null

      - name: Upload quality-reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-node${{ matrix.node }}
          path: quality-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload coverage to summary (Node 22 only)
        if: always() && matrix.node == '22' && hashFiles('quality-reports/summary.md') != ''
        run: |
          {
            echo "## Quality Gate Summary"
            echo
            cat quality-reports/summary.md
          } >> $GITHUB_STEP_SUMMARY

  # Block merge until quality-gate passes on all matrix entries.
  required:
    name: required
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always()
    steps:
      - name: Fail if any quality-gate matrix job failed
        run: |
          if [[ "${{ needs.quality-gate.result }}" != "success" ]]; then
            echo "Quality gate failed (result=${{ needs.quality-gate.result }})"
            exit 1
          fi
          echo "Quality gate passed."
